<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شعيب لقطع غيار السيارات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
--red:#c0392b;--bg:#111;--card:#1a1a1a;--border:#2a2a2a;--text:#f0f0f0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
font-family:'Cairo',sans-serif;
color:var(--text);
display:flex;justify-content:center;
}

.card{max-width:480px;width:100%}

/* ===== HEADER ===== */
.header{
text-align:center;
padding:30px 20px;
}

/* صورة */
.avatar{
width:110px;height:110px;
margin:auto;border-radius:50%;
overflow:hidden;
border:3px solid #000;
}
.avatar img{
width:100%;height:100%;
object-fit:cover;
}

/* لوجو */
.brand-arabic img{
max-width:150px;
margin:10px auto;
display:block;
}

/* ===== BUTTONS ===== */
.cta-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
padding:10px;
}

.cta-btn{
text-align:center;
padding:12px;
border-radius:10px;
color:#fff;text-decoration:none;
font-weight:700;
}
.call{background:#c0392b}
.whatsapp{background:#25d366}
.location{background:#2563eb}

/* ===== INFO ===== */
.info-row{
display:flex;
justify-content:space-between;
background:var(--card);
margin:10px;
padding:12px;
border-radius:10px;
}

/* ===== BRANDS ===== */
.brands-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.brand-card{
background:var(--card);
padding:10px;
border-radius:10px;
text-align:center;
}

.brand-card img{
width:40px;height:40px;
object-fit:contain;
filter:brightness(0) invert(1);
margin:auto;
}

/* ===== PAY ===== */
.payment-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.pay-btn{
display:flex;
align-items:center;
gap:10px;
background:var(--card);
padding:12px;
border-radius:10px;
}

.pay-logo{
width:35px;height:35px;
}

.pay-logo img{
width:100%;height:100%;
object-fit:contain;
}

/* ===== SAVE ===== */
.save-btn{
margin:10px;
padding:15px;
width:calc(100% - 20px);
background:#c0392b;
color:#fff;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

img{display:block}
</style>
</head>

<body>
<div class="card">

<div class="header">

<div class="avatar">
<img src="me.jpg">
</div>

<div class="brand-arabic">
<img src="logo.png">
</div>

<h2>Shoaib Auto Parts</h2>
<p>Eng. Mohamed Shoaib</p>

</div>

<!-- BUTTONS -->
<div class="cta-grid">
<a href="tel:01055315541" class="cta-btn call">اتصل</a>
<a href="https://wa.me/201055315541" class="cta-btn whatsapp">واتساب</a>
<a href="https://maps.google.com?q=Al-Mahalla+Al-Kubra" class="cta-btn location">الموقع</a>
</div>

<!-- INFO -->
<div class="info-row">
<span>01055315541</span>
<span>📞</span>
</div>

<div class="info-row">
<span>المحلة الكبرى</span>
<span>📍</span>
</div>

<!-- BRANDS -->
<div class="brands-grid">

<div class="brand-card">
<img src="skoda.png">
<p>Skoda</p>
</div>

<div class="brand-card">
<img src="vw.png">
<p>VW</p>
</div>

<div class="brand-card">
<img src="audi.png">
<p>Audi</p>
</div>

<div class="brand-card">
<img src="seat.png">
<p>Seat</p>
</div>

</div>

<!-- PAY -->
<div class="payment-grid">

<div class="pay-btn">
<div class="pay-logo">
<img src="instapay.png">
</div>
<span>InstaPay</span>
</div>

<div class="pay-btn">
<div class="pay-logo">
<img src="vodafone.png">
</div>
<span>Vodafone Cash</span>
</div>

</div>

<button class="save-btn" onclick="saveContact()">
حفظ الرقم
</button>

</div>

<script>
function saveContact(){
const vcard=`BEGIN:VCARD
VERSION:3.0
FN:Mohamed Shoaib
TEL:+201055315541
END:VCARD`;

const blob=new Blob([vcard],{type:'text/vcard'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='contact.vcf';
a.click();
}
</script>

</body>
</html>
