<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoaib Auto Parts | شعيب لقطع الغيار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent: #e63946;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* Header & Profile */
        .top-nav { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-icon { background: var(--card-bg); border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; }
        
        .profile-ring {
            width: 120px; height: 120px; margin: 0 auto 15px;
            border-radius: 50%; padding: 3px;
            background: linear-gradient(45deg, var(--accent), #ff4d4d);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
        }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-color); }
        
        .main-logo { width: 160px; margin-bottom: 10px; }
        
        /* Action Buttons */
        .grid-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .action-btn { 
            background: var(--card-bg); padding: 15px 5px; border-radius: 12px; 
            text-decoration: none; color: white; font-size: 13px;
            transition: 0.3s; border-bottom: 3px solid transparent;
        }
        .action-btn i { display: block; font-size: 20px; margin-bottom: 8px; }
        .btn-call { border-color: #8b0000; }
        .btn-wa { border-color: #25d366; }
        .btn-map { border-color: #0056b3; }

        /* Brands Group (VAG) */
        .section-label { font-size: 11px; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; opacity: 0.8; }
        .brands-card { 
            background: var(--card-bg); padding: 20px; border-radius: 15px; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; align-items: center;
        }
        .brands-card img { width: 100%; filter: brightness(0) invert(1); opacity: 0.7; transition: 0.3s; }
        .brands-card img:hover { opacity: 1; transform: scale(1.1); }

        /* Payment Section */
        .pay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .pay-item { 
            background: var(--card-bg); padding: 10px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; color: white; font-weight: bold; font-size: 14px;
        }
        .pay-item img { height: 20px; }

        /* Footer Button */
        .save-contact {
            width: 100%; padding: 16px; border-radius: 30px;
            background: transparent; border: 2px solid var(--accent);
            color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 10px rgba(230, 57, 70, 0.3);
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div class="btn-icon">AR | EN</div>
        <div class="btn-icon"><i class="fas fa-moon"></i></div>
    </div>

    <div class="profile-ring">
        <img src="profile.jpg" class="profile-img" alt="Mohamed Shoaib">
    </div>

    <img src="logo.png" class="main-logo" alt="Shoaib Auto Parts">
    <h2 style="margin: 5px 0;">Shoaib Auto Parts</h2>
    <p style="color: var(--accent); margin: 0; font-size: 14px;">Eng. Mohamed Shoaib</p>

    <div class="grid-actions">
        <a href="tel:01055315541" class="action-btn btn-call">
            <i class="fas fa-phone-alt"></i> اتصل الآن
        </a>
        <a href="https://wa.me/201055315541" class="action-btn btn-wa">
            <i class="fab fa-whatsapp"></i> واتساب
        </a>
        <a href="https://maps.app.goo.gl/YOUR_LOCATION" class="action-btn btn-map">
            <i class="fas fa-map-marker-alt"></i> الموقع
        </a>
    </div>

    <div class="section-label">BRANDS WE WORK WITH</div>
    <div class="brands-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" alt="VW">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/92/Audi-Logo_2016.svg" alt="Audi">
        <img src="https://upload.wikimedia.org/wikipedia/en/3/37/Skoda_Auto_logo_%282023%29.svg" alt="Skoda">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/bd/SEAT_Logo_2017.svg" alt="Seat">
    </div>

    <div class="section-label" style="margin-top: 20px;">PAYMENT METHODS</div>
    <div class="pay-row">
        <div class="pay-item" style="border-left: 4px solid #4b2c85;">
            <img src="instapay.png" alt="InstaPay"> InstaPay
        </div>
        <div class="pay-item" style="border-left: 4px solid #e60000;">
            <i class="fas fa-wallet" style="color: #e60000;"></i> Vodafone
        </div>
    </div>

    <button class="save-contact" onclick="window.location.href='contact.vcf'">
        <i class="fas fa-user-plus"></i> Save Contact | حفظ جهة الاتصال
    </button>

    <p style="font-size: 10px; color: #555; margin-top: 25px;">SHOAIB AUTO PARTS © 2026</p>
</div>

</body>
</html>
