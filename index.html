<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoaib Auto Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"] {
  --bg: #0a0a0a;
  --card-border: #252525;
  --text: #f0f0f0;
  --subtext: #777;
  --red: #c0392b;
  --red2: #e74c3c;
  --red-glow: rgba(192,57,43,0.5);
  --row-bg: #161616;
  --toggle-bg: rgba(255,255,255,0.07);
  --toggle-border: rgba(255,255,255,0.12);
}
:root[data-theme="light"] {
  --bg: #f0f0f0;
  --card-border: #ddd;
  --text: #111;
  --subtext: #666;
  --red: #c0392b;
  --red2: #e74c3c;
  --red-glow: rgba(192,57,43,0.2);
  --row-bg: #fff;
  --toggle-bg: rgba(0,0,0,0.06);
  --toggle-border: rgba(0,0,0,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  background:var(--bg); font-family:'Cairo',sans-serif; color:var(--text);
  display:flex; justify-content:center; min-height:100vh;
  transition:background .4s,color .4s; overflow-x:hidden;
}
.card { max-width:430px; width:100%; position:relative; padding-bottom:30px; }

/* ===== BG ===== */
.bg-pattern {
  position:fixed; top:0; left:50%; transform:translateX(-50%);
  width:430px; height:100vh; pointer-events:none; z-index:0; overflow:hidden;
}
.bg-pattern::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(192,57,43,.03) 30px,rgba(192,57,43,.03) 32px);
}
.bg-pattern::after {
  content:''; position:absolute; top:-150px; left:-100px;
  width:520px; height:520px;
  background:radial-gradient(circle,rgba(192,57,43,.13) 0%,transparent 65%);
  animation:bgPulse 5s ease-in-out infinite;
}
@keyframes bgPulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
.card>*{position:relative;z-index:1;}

/* ===== KEYFRAMES ===== */
@keyframes fadeUp {
  from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)}
}
@keyframes glowRotate {
  0%  { box-shadow: 2px 0   8px rgba(192,57,43,.5),  0 0 0 rgba(192,57,43,0); }
  25% { box-shadow: 0   2px 8px rgba(232,76,60,.5),  0 0 0 rgba(192,57,43,0); }
  50% { box-shadow: -2px 0  8px rgba(192,57,43,.5),  0 0 0 rgba(192,57,43,0); }
  75% { box-shadow: 0  -2px 8px rgba(232,76,60,.5),  0 0 0 rgba(192,57,43,0); }
  100%{ box-shadow: 2px 0   8px rgba(192,57,43,.5),  0 0 0 rgba(192,57,43,0); }
}
@keyframes ringPulse {
  0%,100%{box-shadow:0 0 0 3px var(--red),0 0 20px var(--red-glow),0 0 50px var(--red-glow)}
  50%    {box-shadow:0 0 0 3px var(--red2),0 0 35px var(--red-glow),0 0 80px var(--red-glow)}
}
@keyframes float {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)}
}
@keyframes nameShine {
  0%{background-position:0% center} 100%{background-position:200% center}
}
@keyframes savePulse {
  0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.6)}
  50%    {box-shadow:0 0 0 10px rgba(192,57,43,0)}
}
@keyframes saveShimmer {
  0%  {background-position:-200% center}
  100%{background-position:200% center}
}
@keyframes borderSpin {
  0%  {background-position:0% 50%}
  100%{background-position:300% 50%}
}

/* delays */
.d1{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .05s}
.d2{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .15s}
.d3{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .25s}
.d4{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .35s}
.d5{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .45s}
.d6{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .55s}
.d7{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .65s}
.d8{animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) both .75s}

/* ===== TOP BAR ===== */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px;direction:ltr;}
.theme-toggle{
  display:flex;align-items:center;background:var(--toggle-bg);border:1px solid var(--toggle-border);
  border-radius:24px;padding:5px 8px;gap:2px;cursor:pointer;transition:background .3s;
}
.theme-icon{font-size:14px;padding:3px 7px;border-radius:14px;transition:background .3s;}
.theme-icon.active{background:rgba(255,255,255,.18);}
[data-theme="light"] .theme-icon.active{background:rgba(0,0,0,.12);}
.lang-toggle{
  display:flex;align-items:center;background:var(--toggle-bg);border:1px solid var(--toggle-border);
  border-radius:24px;padding:4px;gap:2px;
}
.lang-opt{
  padding:4px 10px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;
  transition:background .25s,color .25s;color:var(--subtext);user-select:none;font-family:'Cairo',sans-serif;
}
.lang-opt.active{background:var(--red);color:#fff;}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:4px 20px 10px;
}
.avatar{
  width:95px;height:95px;border-radius:50%;overflow:hidden;flex-shrink:0;
  animation:ringPulse 3s ease-in-out infinite, float 4s ease-in-out infinite;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;}

.header-info{
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}

/* لوجو — يتمحور مع الصورة بالضبط */
.logo-wrap{
  display:flex;align-items:center;
  line-height:0;
  /* إزالة أي مسافة زيادة */
  margin:0;padding:0;
}
.logo-wrap img{
  height:220px;width:auto;
  object-fit:contain;display:block;
  /* crop الـ whitespace الزيادة من فوق وتحت */
  object-position:center;
}

/* اسم المهندس بالألوان — تحت اللوجو مباشرة */
.engineer{
  font-size:18px;font-weight:800;
  margin-top:-10px; /* يلصق بـ اللوجو */
  text-align: center;
  background:linear-gradient(135deg,#e74c3c 0%,#f39c12 50%,#e74c3c 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:nameShine 3s linear infinite;
  white-space:nowrap;
  padding-right:4px;
}

/* ===== DIVIDER ===== */
.divider{height:1px;margin:0 16px 2px;background:linear-gradient(to right,transparent,var(--card-border),transparent);}

/* ===== BRANDS — shimmer على الصورة فقط ===== */
.brands-strip{display:flex;gap:8px;padding:10px 16px;justify-content:center;}
.brand-card{
  flex:1;background:var(--row-bg);border:1px solid var(--card-border);
  border-radius:14px;padding:14px 6px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,border-color .2s;
  cursor:default;
  /* glow يدور حول الكارد بهدوء */
  animation:glowRotate 4s ease-in-out infinite;
}
/* كل كارد بـ delay مختلف */
.brand-card:nth-child(1){animation-delay:0s;}
.brand-card:nth-child(2){animation-delay:1s;}
.brand-card:nth-child(3){animation-delay:2s;}
.brand-card:nth-child(4){animation-delay:3s;}
.brand-card:hover{transform:translateY(-4px) scale(1.06);border-color:var(--red);}
.brand-card img{width:52px;height:42px;object-fit:contain;display:block;}
[data-theme="dark"] .brand-card img{mix-blend-mode:screen;}
[data-theme="light"] .brand-card img{mix-blend-mode:multiply;filter:brightness(0);}

/* ===== CTA ===== */
.cta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px 10px;}
.cta-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:15px 6px;border-radius:16px;color:#fff;
  text-decoration:none;font-weight:700;font-family:'Cairo',sans-serif;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),filter .15s;
  position:relative;overflow:hidden;
}
.cta-btn:hover{transform:translateY(-4px) scale(1.04);}
.cta-btn:active{transform:scale(.94);filter:brightness(.88);}
.cta-btn .cta-icon{width:28px;height:28px;}
.cta-btn .cta-icon svg{width:100%;height:100%;fill:white;}
.cta-btn .lbl{font-size:13px;line-height:1;}
.call    {background:linear-gradient(150deg,#e74c3c,#a93226);}
.whatsapp{background:linear-gradient(150deg,#25d366,#1a9f50);}
.loc     {background:linear-gradient(150deg,#3b82f6,#1d4ed8);}

/* ===== INFO ROWS ===== */
.info-row{
  display:flex;align-items:center;gap:12px;background:var(--row-bg);
  margin:0 16px 10px;padding:13px 15px;border-radius:14px;
  border:1px solid var(--card-border);
  transition:transform .2s,box-shadow .2s;text-decoration:none;color:var(--text);
}
.info-row:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.18);}
.info-icon-wrap{
  width:40px;height:40px;background:var(--red);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.info-icon-wrap svg{width:18px;height:18px;fill:white;}
.info-text{flex:1;}
.info-text .lbl{font-size:10px;color:var(--subtext);margin-bottom:2px;letter-spacing:.5px;}
.info-text .val{font-size:14px;font-weight:700;direction:ltr;}
.info-text .sub{font-size:11px;color:var(--subtext);margin-top:2px;}
.info-action{color:var(--red);opacity:.7;}
.info-action svg{width:20px;height:20px;fill:currentColor;}

/* ===== TAGLINE ===== */
.tagline{
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;
  margin:0 16px 4px;padding:10px 14px;background:var(--row-bg);
  border:1px solid var(--card-border);border-radius:12px;
  font-size:11.5px;color:var(--subtext);
}
.tagline .shield{color:var(--red);font-size:13px;}
.tagline .dot{opacity:.3;}

/* ===== SECTION TITLE ===== */
.sec-title{
  text-align:center;font-size:10px;font-weight:700;letter-spacing:3px;
  color:var(--subtext);margin:18px 0 10px;position:relative;
}
.sec-title::before,.sec-title::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:var(--card-border);}
.sec-title::before{right:0;} .sec-title::after{left:0;}

/* ===== PAYMENT ===== */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.pay-btn{
  display:flex;align-items:center;gap:10px;padding:14px 15px;border-radius:14px;
  text-decoration:none;border:none;transition:transform .15s,filter .15s;
  position:relative;overflow:hidden;
}
.pay-btn:active{transform:scale(.95);}
.pay-btn.vodafone{background:linear-gradient(135deg,#e0001a,#b50016);}
.pay-btn.instapay{background:linear-gradient(135deg,#3a0080,#6a1fd1);}
.pay-logo-wrap{
  width:44px;height:44px;border-radius:10px;background:transparent;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
}
.pay-logo-wrap img{width:40px;height:40px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.2);}
.pay-info .pname{font-size:13px;font-weight:800;color:#fff;}
.pay-info .ptap{font-size:10px;color:rgba(255,255,255,.65);}

/* ===== SOCIAL ===== */
.social-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px;}
.soc-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px 6px;border-radius:14px;text-decoration:none;color:#fff;
  font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),filter .15s;
  position:relative;overflow:hidden;
}
.soc-btn:hover{transform:translateY(-4px) scale(1.05);filter:brightness(1.15);}
.soc-btn:active{transform:scale(.94);}
.soc-btn::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,.3),transparent,rgba(255,255,255,.3));
  background-size:300% 300%;animation:borderSpin 4s linear infinite;
  z-index:0;opacity:0;transition:opacity .3s;
}
.soc-btn:hover::before{opacity:1;}
.soc-btn .si,.soc-btn span{position:relative;z-index:1;}
.soc-btn .si{display:flex;align-items:center;justify-content:center;}
.si svg{width:18px;height:18px;fill:white;}
.fb{background:#1877f2;}
.ig{background:linear-gradient(135deg,#405de6,#833ab4,#c13584,#e1306c,#fd1d1d,#fcb045);}
.tt{background:#010101;border:1px solid #2a2a2a;}

/* ===== SAVE BTN — animation لافتة ===== */
.save-btn{
  margin:16px;padding:18px;width:calc(100% - 32px);
  background:transparent;color:var(--text);
  border:2px solid var(--red);border-radius:16px;
  font-weight:900;font-size:16px;font-family:'Cairo',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
  transition:color .25s,transform .15s;
  position:relative;overflow:hidden;
  /* pulse glow دايم */
  animation:savePulse 2s ease-in-out infinite;
}
/* shimmer متحرك على الخلفية */
.save-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(192,57,43,.15) 40%,
    rgba(232,76,60,.3) 50%,
    rgba(192,57,43,.15) 60%,
    transparent 100%);
  background-size:200% auto;
  animation:saveShimmer 2s linear infinite;
}
/* fill عند hover */
.save-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--red),#a93226);
  transform:scaleX(0);transform-origin:left;
  transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:0;
}
.save-btn:hover::before{transform:scaleX(1);}
.save-btn:hover{color:#fff;animation:none;box-shadow:0 0 25px var(--red-glow);}
.save-btn:active{transform:scale(.97);}
.save-btn>*{position:relative;z-index:1;}
.save-si svg{width:24px;height:24px;fill:currentColor;}
.save-txt{text-align:center;}
.save-sub{font-size:11px;opacity:.6;display:block;font-weight:400;margin-top:2px;}
</style>
</head>
